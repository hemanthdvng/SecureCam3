name: Build SecureCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant gradlew permission
        run: chmod +x gradlew || true

      - name: Clean build
        run: gradle clean --no-daemon || true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g -XX:MaxMetaspaceSize=512m"
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: List APK output
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureCam-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            **/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30